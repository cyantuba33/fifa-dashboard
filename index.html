<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate FIFA 2026 Dashboard</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --green: #22c55e; --yellow: #eab308; --red: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #020617; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .section { margin-top: 30px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 8px; border-left: 5px solid #475569; }
        
        table { width: 100%; border-collapse: collapse; background: #1e293b; color: white; border-radius: 8px; overflow: hidden; }
        th { background: #334155; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        
        .status-q { color: var(--green); font-weight: bold; }
        .status-c { color: var(--yellow); font-weight: bold; }
        .status-e { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>ULTIMATE MATCH DASHBOARD</h1>
        <button class="btn" onclick="location.reload()">RELOAD DATA</button>
    </div>

    <div class="section">
        <h2>🏆 R32 Qualification Tracker</h2>
        <table>
            <thead><tr><th>Rank</th><th>Team</th><th>Pts</th><th>Status</th></tr></thead>
            <tbody id="standings-body"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>📅 Matches</h2>
        <div class="grid" id="matches-grid"></div>
    </div>
</div>

<script>
const standings = [
    { r: 1, t: "Sweden", p: 4, s: "Qualified", class: "status-q" },
    { r: 2, t: "Ecuador", p: 4, s: "Qualified", class: "status-q" },
    { r: 3, t: "Senegal", p: 3, s: "In Contention", class: "status-c" },
    { r: 4, t: "Uruguay", p: 2, s: "Eliminated", class: "status-e" }
];

const matches = [
    { home: "Mexico", away: "South Africa", score: "2-0", status: "Full Time", date: "Jun 11" },
    { home: "South Korea", away: "Czechia", score: "2-1", status: "Full Time", date: "Jun 12" },
    { home: "New Zealand", away: "Belgium", score: "Vs", status: "Upcoming", date: "Jun 27" },
    { home: "Panama", away: "England", score: "Vs", status: "Upcoming", date: "Jun 27" }
];

function updateUI() {
    document.getElementById('standings-body').innerHTML = standings.map(r => `
        <tr><td>${r.r}</td><td>${r.t}</td><td>${r.p}</td><td class="${r.class}">${r.s}</td></tr>
    `).join('');

    document.getElementById('matches-grid').innerHTML = matches.map(m => `
        <div class="card">
            <div style="font-size: 12px; color: #94a3b8;">${m.date}</div>
            <div style="font-size: 18px; margin: 10px 0;"><strong>${m.home} vs ${m.away}</strong></div>
            <div style="font-weight: bold; color: ${m.status === 'Upcoming' ? '#94a3b8' : '#22c55e'}">${m.score} (${m.status})</div>
        </div>
    `).join('');
}
updateUI();
</script>
</body>
</html>
