<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ultimate Match Dashboard</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --green: #22c55e; --yellow: #eab308; --red: #ef4444; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 40px; text-transform: uppercase; margin: 0; }
        
        /* Grid Layout */
        .live-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 20px; }
        
        /* Color Coding */
        .status-tag { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        .qualified { background: var(--green); color: #000; }
        .contention { background: var(--yellow); color: #000; }
        .eliminated { background: var(--red); color: #fff; }

        table { width: 100%; border-collapse: collapse; background: #1a1a1a; margin-top: 20px; }
        th { text-align: left; padding: 15px; color: #888; text-transform: uppercase; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ULTIMATE MATCH DASHBOARD</h1>
            <p>Live Edition • Refreshing... <span id="reload-timer">30s</span></p>
        </div>

        <h2 style="color:#aaa;">🏆 Round of 32: Qualification Tracker</h2>
        <table>
            <thead><tr><th>Rank</th><th>Team</th><th>Pts</th><th>Status</th></tr></thead>
            <tbody id="standings-body"></tbody>
        </table>

        <h2 style="color:#aaa; margin-top:50px;">🔴 LIVE NOW</h2>
        <div class="live-grid" id="live-grid"></div>
    </div>

    <script>
        // DATA SOURCE (This is your "Mock API" - easy to edit)
        const standings = [
            { r: 1, t: "Sweden", p: 4, s: "Qualified" },
            { r: 2, t: "Ecuador", p: 4, s: "Qualified" },
            { r: 3, t: "Senegal", p: 3, s: "In Contention" },
            { r: 4, t: "Uruguay", p: 2, s: "Eliminated" }
        ];

        const liveMatches = [
            { h: "USA", a: "Japan", score: "4 - 12", status: "36' Live", group: "Group A" },
            { h: "CRO", a: "GHA", score: "10 - 10", status: "69' Live", group: "Group A" }
        ];

        // RENDER ENGINE
        function render() {
            // Populate Standings
            document.getElementById('standings-body').innerHTML = standings.map(r => `
                <tr>
                    <td>${r.r}</td><td>${r.t}</td><td>${r.p}</td>
                    <td><span class="status-tag ${r.s.toLowerCase().replace('in contention', 'contention')}">${r.s}</span></td>
                </tr>
            `).join('');

            // Populate Live Matches
            document.getElementById('live-grid').innerHTML = liveMatches.map(m => `
                <div class="card">
                    <div style="font-size:12px; color:#888;">${m.group} • ${m.status}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center; margin: 15px 0;">
                        <span style="font-size:20px;">${m.h}</span>
                        <span style="font-size:30px; font-weight:bold; color:var(--green);">${m.score}</span>
                        <span style="font-size:20px;">${m.a}</span>
                    </div>
                </div>
            `).join('');
        }
        
        render();
    </script>
</body>
</html>
